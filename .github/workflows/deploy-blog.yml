name: Deploy Blog

on:
  push:
    branches:
      - main
    paths:
      - "Content/**"
      - "Resources/**"
      - "Sources/**"
      - "Package.swift"
      - "Package.resolved"
      - "scripts/prepare_for_deploy.py"
      - "scripts/check_output_site.py"
      - "scripts/check_public_site.py"
      - ".github/workflows/deploy-blog.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-blog-production
  cancel-in-progress: false

jobs:
  deploy:
    name: GitHub Pages
    runs-on: macos-latest
    steps:
      - name: Check out blog source
        uses: actions/checkout@v4

      - name: Verify deploy credentials
        env:
          BLOG_DEPLOY_TOKEN: ${{ secrets.BLOG_DEPLOY_TOKEN }}
        run: |
          if [ -z "$BLOG_DEPLOY_TOKEN" ]; then
            echo "::error::BLOG_DEPLOY_TOKEN is not configured"
            exit 1
          fi

      - name: Run script tests
        run: python3 -m unittest discover -s tests/scripts -p 'test_*.py'

      - name: Build and check site
        run: scripts/prepare_for_deploy.py --skip-images

      - name: Check out public site
        uses: actions/checkout@v4
        with:
          repository: tanabe1478/tanabe1478.github.io
          ref: master
          token: ${{ secrets.BLOG_DEPLOY_TOKEN }}
          path: .deploy/public-site

      - name: Sync generated site
        run: rsync -a --delete --exclude .git Output/ .deploy/public-site/

      - name: Commit and push public site
        working-directory: .deploy/public-site
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No deployment changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish site from ${GITHUB_SHA::7}"
          git push origin master

      - name: Check public site
        run: |
          for attempt in {1..10}; do
            echo "Public smoke check attempt $attempt/10"
            if python3 scripts/check_public_site.py; then
              exit 0
            fi
            sleep 15
          done
          echo "::error::Public smoke check failed after deployment"
          exit 1
