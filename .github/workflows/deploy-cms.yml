name: Deploy CMS

on:
  push:
    branches:
      - main
    paths:
      - "cms/**"
      - ".github/workflows/deploy-cms.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cms-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Cloudflare Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cms/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run checks
        run: npm run check
      - name: Upload CMS E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cms-e2e-deploy-${{ github.run_id }}
          path: |
            cms/playwright-report
            cms/test-results
          if-no-files-found: ignore
          retention-days: 7
      - name: Verify deploy credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not configured"
            exit 1
          fi
      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy
